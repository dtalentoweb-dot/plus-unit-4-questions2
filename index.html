  <title>Grammar Card – Interrogative</title>

<body>

  <div class="card">
    <p class="card__title">Interrogative</p>
    <hr class="divider" />
    <p class="card__formula">Was / were + subject + v (-ing)</p>
    <hr class="divider" />
    <p class="card__example">were they studying?</p>
    <p class="card__translation">Estaban estudiando?</p>
  </div>
