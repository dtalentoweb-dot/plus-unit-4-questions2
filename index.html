<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Past Continuous - Interrogative</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
    }

    .card {
      border: 2px solid #333;
      padding: 30px 50px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      background-color: #fff;
    }

    .title {
      font-size: 1.3rem;
      font-weight: normal;
      margin: 0 0 16px 0;
      color: #000;
    }

    .subtitle {
      font-size: 1.1rem;
      font-weight: bold;
      margin: 0 0 26px 0;
      color: #000;
    }

    .example-en {
      font-size: 1.15rem;
      font-weight: bold;
      color: #000;
      margin: 0 0 8px 0;
    }

    .example-es {
      font-size: 1.05rem;
      color: #aaa;
      font-weight: normal;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="title">Interrogative</p>
    <p class="subtitle">Was / were + subject + v (-ing)</p>

    <p class="example-en">were they studying?</p>
    <p class="example-es">Estaban estudiando?</p>
  </div>
</body>
</html>
